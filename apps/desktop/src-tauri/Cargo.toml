# This crate is intentionally standalone — NOT a member of the root Lumen
# workspace. Tauri's tooling builds it directly; declaring an empty
# [workspace] table prevents Cargo from auto-attaching it to a parent
# workspace if globs are added there in the future.
[workspace]

[package]
name = "desktop"
version = "0.1.0"
description = "Lumen desktop app (Tauri 2 shell)"
authors = ["Patrick Kennedy <patrick@primorispartners.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

