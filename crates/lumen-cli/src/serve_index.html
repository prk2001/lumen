<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lumen — Live Preview</title>
<style>
  :root {
    --bg: #0e0f12;
    --fg: #e7e9ee;
    --dim: #8b8f99;
    --accent: #d6a854;
    --warn: #d65454;
    --border: #1f2128;
    --panel: #16181d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header {
    padding: 10px 18px; display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  header .brand { font-weight: 600; letter-spacing: 0.02em; color: var(--accent); }
  header .meta { color: var(--dim); }
  header .meta b { color: var(--fg); font-weight: 500; }
  main {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border); height: calc(100% - 48px);
  }
  .panel { background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  .panel h2 {
    margin: 0; padding: 8px 14px; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim);
    border-bottom: 1px solid var(--border);
  }
  .panel .frame {
    flex: 1; min-height: 0; padding: 14px;
    display: flex; align-items: center; justify-content: center;
    background:
      repeating-conic-gradient(#1d2027 0% 25%, #161920 0% 50%) 0 0 / 16px 16px;
  }
  .panel img { max-width: 100%; max-height: 100%; display: block; }
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20, 22, 28, 0.88);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    color: var(--dim);
    padding: 6px 14px; font-size: 11px;
    display: flex; gap: 18px;
  }
  footer .kv b { color: var(--fg); font-weight: 500; }
  footer .err { color: var(--warn); }
  button {
    background: transparent; color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px; font: inherit; cursor: pointer;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<header>
  <span class="brand">LUMEN</span>
  <span class="meta">live preview · <b id="render-ms">—</b> ms · v<b id="version">0</b></span>
  <span style="flex: 1"></span>
  <button onclick="forceRender()">Re-render</button>
</header>
<main>
  <section class="panel">
    <h2>Input</h2>
    <div class="frame"><img id="img-in" alt="input"></div>
  </section>
  <section class="panel">
    <h2>Output</h2>
    <div class="frame"><img id="img-out" alt="output"></div>
  </section>
</main>
<footer>
  <span class="kv">in <b id="input-path">—</b></span>
  <span class="kv">out <b id="output-path">—</b></span>
  <span class="kv err" id="err-msg"></span>
</footer>
<script>
let lastVersion = -1;
function bust(url) { return url + '?v=' + lastVersion + '_' + Date.now(); }

async function tick() {
  try {
    const r = await fetch('/status', { cache: 'no-store' });
    const s = await r.json();
    document.getElementById('render-ms').textContent = s.last_render_ms;
    document.getElementById('version').textContent = s.output_version;
    document.getElementById('input-path').textContent = s.input_path || '—';
    document.getElementById('output-path').textContent = s.output_path || '—';
    document.getElementById('err-msg').textContent = s.error ? '✗ ' + s.error : '';

    if (s.output_version !== lastVersion) {
      lastVersion = s.output_version;
      document.getElementById('img-in').src = bust('/input');
      document.getElementById('img-out').src = bust('/output');
    }
  } catch (e) {
    document.getElementById('err-msg').textContent = '✗ ' + e;
  }
}

async function forceRender() {
  await fetch('/render', { method: 'POST' });
  tick();
}

setInterval(tick, 500);
tick();
</script>
</body>
</html>
